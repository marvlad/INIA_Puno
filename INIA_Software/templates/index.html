<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generador de Reportes de Fertilización</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            margin-top: 28px;
            background: #166534;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #14532d;
        }

        .hint {
            color: #6b7280;
            font-size: 13px;
            margin-top: 4px;
        }

        .section {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Generador de Reportes</h1>

        <form action="/generate" method="post">

            <label>Nombre del agricultor / productor</label>
            <input
                type="text"
                name="name"
                placeholder="Ejemplo: Huaman Huaman Arturo"
                required
            >

            <label>Cultivo</label>
            <select name="cultivo" required>
                {% for cultivo in cultivos %}
                    <option value="{{ cultivo }}">{{ cultivo }}</option>
                {% endfor %}
            </select>

            <div class="section">
                <h3>Archivos de entrada</h3>

                <label>RESULTADOS Excel</label>
                <input
                    type="text"
                    name="resultados_excel"
                    value="{{ resultados_excel }}"
                    required
                >
                <div class="hint">Archivo con CODIGO, nombre, pH, P, K, etc.</div>

                <label>Template Excel</label>
                <input
                    type="text"
                    name="template_excel"
                    value="{{ template_excel }}"
                    required
                >
                <div class="hint">Archivo base: Software_Mejorado_Cultivos_Anuales_2025-2026_Arapa.xlsx</div>
            </div>

            <div class="section">
                <h3>Carpetas</h3>

                <label>Carpeta central de reportes</label>
                <input
                    type="text"
                    name="report_root"
                    value="{{ report_root }}"
                    required
                >

                <label>Carpeta de PDFs originales SU</label>
                <input
                    type="text"
                    name="pdf_folder"
                    value="{{ pdf_folder }}"
                    required
                >
            </div>

            <button type="submit">Generar reporte</button>
        </form>
    </div>
</body>
</html>
